version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: clawdwa
    main: ./cmd/clawdwa
    binary: clawdwa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: clawdwa
    format: binary
    name_template: "clawdwa_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: makash
    name: clawdwa
  name_template: "{{.Tag}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
